<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airbus Wind</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#00205B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A320 Wind">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <style>
        :root {
            --airbus-blue: #00205B;      
            --airbus-light: #0055A5;     
            --bg-page: #F4F7F9;          
            --card-bg: #FFFFFF;          
            --text-dark: #2C3E50;        
            --border-color: #D1D9E6;     
            --success-green: #2E7D32;
            --warning-red: #D32F2F;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px; 
        }

        .calculator-card {
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 32, 91, 0.08); 
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            border-top: 6px solid var(--airbus-blue);
        }

        h2 {
            text-align: center;
            color: var(--airbus-blue);
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 800;
            font-size: 22px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--airbus-blue);
            margin-top: 15px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .flex-row > div {
            flex: 1;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #556;
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px; 
            background-color: #F8FAFC;
            color: var(--text-dark);
            transition: background-color 0.3s;
        }

        button {
            width: 100%;
            background-color: var(--airbus-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-metar {
            margin-top: 22px; 
            background-color: #E2E8F0;
            color: var(--airbus-blue);
            border: 1px solid var(--border-color);
        }

        .metar-display {
            background-color: #F1F5F9;
            color: var(--text-dark);
            font-family: monospace;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
            word-wrap: break-word;
            border: 1px solid var(--border-color);
        }

        .result-box {
            margin-top: 25px;
            display: none;
        }

        .comp-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            background-color: #F8FAFC;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .comp-title {
            font-weight: 600;
            font-size: 12px;
            color: #64748B;
        }

        .comp-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--airbus-blue);
        }

        .warning-badge {
            font-weight: bold;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .badge-ok { background-color: #E8F5E9; color: var(--success-green); }
        .badge-fail { background-color: #FFEBEE; color: var(--warning-red); }
        .card-fail { border-color: var(--warning-red); background-color: #FFF5F5; }
        .card-fail .comp-value { color: var(--warning-red); }

        .banner {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            margin-top: 15px;
            color: white;
        }
        .banner-ok { background-color: var(--airbus-blue); }
        .banner-fail { background-color: var(--warning-red); }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>Airbus Wind Calc</h2>
        
        <div class="section-title">AIRCRAFT & RUNWAY</div>
        <select id="aircraftModel" style="margin-bottom: 10px;">
            <optgroup label="A320neo Family">
                <option value="A320neo_LEAP">A320neo (LEAP-1A)</option>
                <option value="A320neo_PW">A320neo (PW1100G)</option>
                <option value="A321neo_LEAP">A321neo (LEAP-1A)</option>
                <option value="A321neo_PW">A321neo (PW1100G)</option>
            </optgroup>
            <optgroup label="A320ceo Family">
                <option value="A320ceo_CFM">A320ceo (CFM56)</option>
                <option value="A320ceo_IAE">A320ceo (IAE V2500)</option>
                <option value="A321ceo_CFM">A321ceo (CFM56)</option>
                <option value="A321ceo_IAE">A321ceo (IAE V2500)</option>
            </optgroup>
            <optgroup label="Widebody">
                <option value="A330">A330</option>
            </optgroup>
        </select>

        <select id="runwayCondition" style="margin-bottom: 15px;">
            <option value="dry">Runway: DRY (Normal Limits)</option>
            <option value="wet">Runway: WET (Auto-detected)</option>
            <option value="contaminated">Runway: CONTAMINATED (Auto-detected)</option>
        </select>

        <div class="section-title">WEATHER</div>
        <div class="flex-row">
            <div>
                <label>ICAO</label>
                <input type="text" id="icao" placeholder="LTFM" maxlength="4" style="text-transform: uppercase;">
            </div>
            <div>
                <button class="btn-metar" onclick="fetchMetar()">METAR</button>
            </div>
        </div>

        <div class="metar-display" id="rawMetar">Waiting for VATSIM...</div>

        <div class="flex-row">
            <div>
                <label>DIR (°)</label>
                <input type="number" id="windDir" placeholder="000">
            </div>
            <div>
                <label>SPD (KT)</label>
                <input type="number" id="windSpd" placeholder="00">
            </div>
            <div>
                <label>GUST</label>
                <input type="number" id="windGust" placeholder="Opt">
            </div>
        </div>

        <div class="section-title">RUNWAY HEADING</div>
        <input type="number" id="rwy" placeholder="352" style="margin-bottom: 20px;">

        <button onclick="calculateWind()">CALCULATE</button>

        <div class="result-box" id="resultBox">
            <div class="comp-card" id="crosswindCard">
                <div>
                    <div class="comp-title">Crosswind</div>
                    <div class="comp-value" id="crosswindVal">-- KT</div>
                </div>
                <div class="warning-badge" id="crosswindBadge">OK</div>
            </div>

            <div class="comp-card" id="headTailCard">
                <div>
                    <div class="comp-title" id="headTailTitle">Headwind</div>
                    <div class="comp-value" id="headTailVal">-- KT</div>
                </div>
                <div class="warning-badge" id="headTailBadge">OK</div>
            </div>

            <div id="statusBanner" class="banner" style="display:none;"></div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=3')
                .then(reg => console.log('PWA Ready v3!', reg))
                .catch(err => console.log('PWA Error:', err));
            });
        }

        const aircraftLimits = {
            "A320neo_LEAP": { crosswind: 38, tailwind: 15 },
            "A320neo_PW":   { crosswind: 38, tailwind: 15 },
            "A321neo_LEAP": { crosswind: 38, tailwind: 10 },
            "A321neo_PW":   { crosswind: 38, tailwind: 10 },
            "A320ceo_CFM":  { crosswind: 38, tailwind: 15 },
            "A320ceo_IAE":  { crosswind: 38, tailwind: 15 },
            "A321ceo_CFM":  { crosswind: 38, tailwind: 10 },
            "A321ceo_IAE":  { crosswind: 38, tailwind: 10 },
            "A330":         { crosswind: 40, tailwind: 15 }
        };

        async function fetchMetar() {
            let icao = document.getElementById('icao').value.toUpperCase();
            if(icao.length !== 4) { alert("Valid ICAO required."); return; }
            document.getElementById('rawMetar').innerText = "Fetching...";
            try {
                let response = await fetch(`https://metar.vatsim.net/metar.php?id=${icao}`);
                if (!response.ok) throw new Error("Net Err");
                let metarText = await response.text();
                if(!metarText || metarText.includes("No METAR")) {
                    document.getElementById('rawMetar').innerText = "No METAR found."; return;
                }
                document.getElementById('rawMetar').innerText = metarText;

                // --- OTOMATİK PİST DURUMU BELİRLEME (YENİ) ---
                let rwyCondition = 'dry'; 
                // Kar, Dolu, Buz, Donan Yağmur
                const contaminatedRegex = /(?:\s|^)([-+]?(?:SH)?(?:SN|SG|PL|GR|GS)|[-+]?FZ(?:RA|DZ|FG))(?:\s|$)/;
                // Yağmur, Çiseleme
                const wetRegex = /(?:\s|^)([-+]?(?:SH|TS)?(?:RA|DZ))(?:\s|$)/;

                if (contaminatedRegex.test(metarText)) {
                    rwyCondition = 'contaminated';
                } else if (wetRegex.test(metarText)) {
                    rwyCondition = 'wet';
                }

                let conditionSelect = document.getElementById('runwayCondition');
                conditionSelect.value = rwyCondition;
                
                // Kullanıcının otomatik değişimi fark etmesi için kısa süreli yeşil parlama efekti
                if(rwyCondition !== 'dry') {
                    conditionSelect.style.backgroundColor = "#E8F5E9"; // Açık yeşil
                    setTimeout(() => conditionSelect.style.backgroundColor = "#F8FAFC", 2500);
                }
                // ----------------------------------------------

                // Rüzgar Ayrıştırma
                let match = metarText.match(/(\d{3}|VRB)(\d{2,3})(?:G(\d{2,3}))?KT/);
                if(match) {
                    if(match[1] === "VRB") {
                        document.getElementById('windDir').value = "";
                        alert("Wind VRB. Enter dir manually.");
                    } else { document.getElementById('windDir').value = parseInt(match[1]); }
                    document.getElementById('windSpd').value = parseInt(match[2]);
                    document.getElementById('windGust').value = match[3] ? parseInt(match[3]) : "";
                }
            } catch (error) { document.getElementById('rawMetar').innerText = "Network Error."; }
        }

        function calculateWind() {
            let rwy = parseFloat(document.getElementById('rwy').value);
            let windDir = parseFloat(document.getElementById('windDir').value);
            let windSpd = parseFloat(document.getElementById('windSpd').value);
            let windGust = parseFloat(document.getElementById('windGust').value);
            let modelKey = document.getElementById('aircraftModel').value;
            let condition = document.getElementById('runwayCondition').value; 

            if(isNaN(rwy) || isNaN(windDir) || isNaN(windSpd)) { alert("Fill required fields."); return; }

            let maxSpeed = isNaN(windGust) ? windSpd : Math.max(windSpd, windGust);
            let rad = (windDir - rwy) * (Math.PI / 180);
            let crosswind = Math.abs(maxSpeed * Math.sin(rad));
            let headwind = maxSpeed * Math.cos(rad);
            
            let baseLimits = aircraftLimits[modelKey];
            let currentCrosswindLimit = baseLimits.crosswind;
            let currentTailwindLimit = baseLimits.tailwind;

            if (condition === "wet") {
                currentCrosswindLimit = Math.min(29, baseLimits.crosswind); 
            } else if (condition === "contaminated") {
                currentCrosswindLimit = Math.min(15, baseLimits.crosswind); 
                currentTailwindLimit = 0; 
            }

            let allPassed = true;
            document.getElementById('resultBox').style.display = 'block';

            let xwCard = document.getElementById('crosswindCard');
            let xwBadge = document.getElementById('crosswindBadge');
            document.getElementById('crosswindVal').innerText = `${crosswind.toFixed(1)} KT`;
            
            if (crosswind > currentCrosswindLimit) {
                xwCard.className = "comp-card card-fail"; 
                xwBadge.className = "warning-badge badge-fail";
                xwBadge.innerText = `MAX ${currentCrosswindLimit}`; 
                allPassed = false;
            } else { 
                xwCard.className = "comp-card"; 
                xwBadge.className = "warning-badge badge-ok"; 
                xwBadge.innerText = `OK (MAX ${currentCrosswindLimit})`; 
            }
            
            let isTailwind = headwind < 0; 
            let hwTwVal = Math.abs(headwind);
            let htCard = document.getElementById('headTailCard'); 
            let htBadge = document.getElementById('headTailBadge');
            
            document.getElementById('headTailTitle').innerText = isTailwind ? "Tailwind" : "Headwind";
            document.getElementById('headTailVal').innerText = `${hwTwVal.toFixed(1)} KT`;
            
            if (isTailwind && hwTwVal > currentTailwindLimit) {
                htCard.className = "comp-card card-fail"; 
                htBadge.className = "warning-badge badge-fail";
                htBadge.innerText = `MAX ${currentTailwindLimit}`; 
                allPassed = false;
            } else { 
                htCard.className = "comp-card"; 
                htBadge.className = "warning-badge badge-ok"; 
                htBadge.innerText = isTailwind ? `OK (MAX ${currentTailwindLimit})` : "OK"; 
            }

            let banner = document.getElementById('statusBanner');
            banner.style.display = 'block';
            if(allPassed) {
                banner.className = "banner banner-ok"; 
                banner.innerText = "✔ LANDING LIMITS OK";
            } else {
                banner.className = "banner banner-fail"; 
                banner.innerText = "⚠ LIMITS EXCEEDED";
            }
        }
    </script>
</body>
</html>
